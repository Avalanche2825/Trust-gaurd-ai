services:
  # 1. Python ML Private Service (Runs internally on port 5001)
  - type: pserv
    name: sach-kavach-ml-service
    runtime: python
    rootDir: ml_service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:5001
    envVars:
      - key: ML_PORT
        value: 5001

  # 2. Node.js Backend API (Web Service, runs on port 4000)
  - type: web
    name: sach-kavach-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: ML_SERVICE_URL
        value: http://sach-kavach-ml-service:5001
      - key: FRONTEND_URL
        value: https://sach-kavach-grid.vercel.app
      - key: MONGODB_URI
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
